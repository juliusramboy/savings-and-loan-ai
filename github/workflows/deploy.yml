name: MobilePaluwagan-ai CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload Jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-artifact
          path: target/SavingsAndLoanAi-0.0.1-SNAPSHOT.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar-artifact
          path: .

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure app directory exists on EC2
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} "mkdir -p /home/ubuntu/app"

      - name: Copy JAR to EC2
        run: |
          scp -i ~/.ssh/id_rsa \
          SavingsAndLoanAi-0.0.1-SNAPSHOT.jar \
          ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/app/SavingsAndLoanAi.jar   

      - name: Write env file on EC2
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} "cat > /home/ubuntu/app/.env << 'ENVEOF'
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GROQ_BASE_URL=${{ secrets.GROQ_BASE_URL }}
          GROQ_MODEL=${{ secrets.GROQ_MODEL }}
          PROJECT_A_URL=${{ secrets.PROJECT_A_URL }}
          ENVEOF"

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          echo "Stopping existing application..."
          sudo systemctl stop springboot || true
          echo "Starting application..."
          sudo systemctl start springboot
          echo "Checking status..."
          sudo systemctl status springboot --no-pager
          echo "Deployment complete!"
          EOF